  <style>         body { background-color: #0d1117; color: #fff; font-family: sans-serif; padding: 2px; margin: 0; }         .filter-container { display: flex; justify-content: space-between; padding: 8px; background: #161b22; margin-bottom: 20px; border-radius: 10px; gap: 5px; }         .filter-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 6px 4px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; flex: 1; text-align: center; }         .filter-btn span { display: block; font-size: 11px; margin-top: 2px; color: #10b981; }

   <script>         let currentFilter = 'all';         let currentSearch = '';          document.addEventListener('DOMContentLoaded', () => { setTimeout(() => { document.getElementById('loader-container').style.display = 'none'; }, 800); updateTimers(); });          function filterMatches(input) {             if (['all', 'live', 'recent', 'upcoming'].includes(input)) currentFilter = input;             else currentSearch = input.toLowerCase();             document.querySelectorAll('.card').forEach(card => {                 let cat = getCategory(card.querySelector('.timer').innerText);                 let text = card.innerText.toLowerCase();                 card.style.display = ((currentFilter === 'all' || cat === currentFilter) && text.includes(currentSearch)) ? "block" : "none";             });           updateCounts();         }          function getCategory(text) {             if (text.includes('Live') || text.includes('Playing')) return 'live';             if (text.includes('Finished')) return 'recent';             if (text.includes('Upcoming') || text.includes('Start')) return 'upcoming';             return 'other';         }          function updateCounts() {             let counts = { all: 0, live: 0, recent: 0, upcoming: 0 };             document.querySelectorAll('.card').forEach(card => {                 let cat = getCategory(card.querySelector('.timer').innerText);                 counts.all++;                 if (counts.hasOwnProperty(cat)) counts[cat]++;             });             document.getElementById('count-all').innerText = "(" + counts.all + ")";             document.getElementById('count-live').innerText = "(" + counts.live + ")";             document.getElementById('count-recent').innerText = "(" + counts.recent + ")";             document.getElementById('count-upcoming').innerText = "(" + counts.upcoming + ")";         }          function updateTimers() {             document.querySelectorAll('.status').forEach(el => {                 let start = new Date(el.getAttribute('data-start')).getTime();                 let now = new Date().getTime();                 let diff = start - now;                 let timerEl = el.querySelector('.timer');                 let dateObj = new Date(start);                                  let card = el.closest('.card');                 let league = card.querySelector('.league-header').innerText.toUpperCase();                 let maxDuration = 12600000;                 if (league.includes('TEST')) maxDuration = 432000000;                 else if (league.includes('ODI')) maxDuration = 36000000;                  el.querySelector('.start-time').innerText = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true});                 el.querySelector('.start-date').innerText = dateObj.toLocaleDateString('en-GB');                  if (diff < 0 && diff > -maxDuration) {                     let elapsed = Math.abs(diff);                     if (league.includes('TEST')) {                         let dayElapsed = elapsed % 86400000;                         let playDuration = 36000000;                          if (dayElapsed < playDuration) {                             let h = Math.floor(dayElapsed / 3600000);                             let m = Math.floor((dayElapsed % 3600000) / 60000);                             let s = Math.floor((dayElapsed % 60000) / 1000);                             timerEl.className = "timer text-red";                             timerEl.innerHTML = `<div class="dot"></div> Live | Playing ${h}h ${m}m ${s}s`;                         } else {                             timerEl.className = "timer text-orange";                             timerEl.innerText = "Stumps / Day Break";                         }                     } else {                         let h = Math.floor(elapsed / 3600000);                         let m = Math.floor((elapsed % 3600000) / 60000);                         let s = Math.floor((elapsed % 60000) / 1000);                         timerEl.className = "timer text-red";                         timerEl.innerHTML = `<div class="dot"></div> Live | Playing ${h}h ${m}m ${s}s`;                     }                 } else if (diff <= -maxDuration) {                     timerEl.className = "timer";                     timerEl.innerText = "Finished";                 } else {                     let h = Math.floor(diff / 3600000);                     let m = Math.floor((diff % 3600000) / 60000);                     let s = Math.floor((diff % 60000) / 1000);                     if (diff > 0 && diff <= 28800000) {                         timerEl.className = "timer text-green";                         timerEl.innerText = "Start in: " + h + "h " + m + "m " + s + "s";                     } else {                         timerEl.className = "timer text-green";                         timerEl.innerText = "Upcoming";                     }                 }             });             updateCounts();         }         setInterval(updateTimers, 1000);          function sendData(url) {             if (window.AppInventor) window.AppInventor.setWebViewString(url);             else if (window.CustomWebView) window.CustomWebView.setWebViewString(url);             else window.WebViewString = url;         }    
</script> </body> </html>
