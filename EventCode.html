<!DOCTYPE html> 
<html> 
<head>     
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
</head> 
<body>

<!-- লোডার -->
<div id="loader-container">
    <div class="loader"></div>
</div>

<!-- লাইভ স্লাইডার কন্টেইনার (যেখানে ডেটা ডায়নামিকালি লোড হবে) -->
<div class="live-slider-container" id="liveSliderContainer">
  <!-- আইটেমগুলো জাভাস্ক্রিপ্ট দিয়ে ডেমো বা রিয়েল ডাটা থেকে লোড হবে -->
</div> 

<!-- স্লাইডার ডট ইনডিকেটর -->
<div class="slider-dots" id="sliderDots"></div>

<!-- সেকশন হেডিং -->
<div style="font-size: 13px; font-weight: bold; margin: 20px 0 10px 5px; color: #10b981;">POPULAR MOVIES & SERIES</div>

<!-- মুভি কন্টেইনার (লেজি লোডিং ও ইনফিনিট স্ক্রোলিং এর জন্য) -->
<div id="movieContainer"></div>

<style>     
    body { background-color: #0d1117; color: #fff; font-family: sans-serif; padding: 2px; margin: 0; padding-bottom: 90px; }

    /* লাইভ ইভেন্ট হরিজন্টাল স্লাইডার স্টাইল */
    .live-slider-container {
        display: flex;
        overflow-x: auto;
        gap: 15px;
        padding: 5px 10px 15px 10px;
        margin-bottom: 5px;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
    }

    .live-slider-container::-webkit-scrollbar {
        display: none;
    }

    /* স্লাইডার ডট ইনডিকেটর স্টাইল */
    .slider-dots {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
        width: 100%;
        margin: 5px 0 20px 0;
    }

    .slider-dots span {
        width: 8px;
        height: 8px;
        background: #484f58;
        border-radius: 50%;
        cursor: pointer;
        transition: background 0.3s, width 0.3s;
    }

    .slider-dots span.active {
        background: #10b981;
        width: 22px;
        border-radius: 4px;
    }

    /* প্রতিটি লাইভ কার্ডের সাইজ */
    .live-slider-container .card {
        flex: 0 0 85% !important;
        max-width: 320px !important;
        scroll-snap-align: start;
        margin-bottom: 0 !important;
    }

    /* সাধারণ কার্ড ও আরজিবি বর্ডার অ্যানিমেশন */ 
    .card {      
        background: #161b22;      
        border: 2px solid transparent;      
        border-radius: 15px;      
        padding: 15px;      
        margin-bottom: 20px;      
        cursor: pointer;      
        width: 100%;      
        box-sizing: border-box;     
        background-clip: padding-box, border-box;     
        background-origin: border-box;     
        background-image: linear-gradient(#161b22, #161b22), linear-gradient(45deg, #f43f5e, #10b981, #3b82f6, #f43f5e);     
        background-size: 100% 100%, 400% 400%;     
        animation: gradient-animation 3s ease infinite; 
        position: relative !important;
    }

    @keyframes gradient-animation {     
        0% { background-position: 0% 50%; }     
        50% { background-position: 100% 50%; }     
        100% { background-position: 0% 50%; } 
    }             

    .league-header { font-size: 11px; font-weight: bold; margin-bottom: 8px; text-align: center; }         
    .match-row { display: flex; align-items: center; justify-content: space-between; }         
    .team { display: flex; flex-direction: column; align-items: center; width: 35%; }         
    .logo-box { width: 40px; height: 40px; border-radius: 50%; background: #fff; border: 2px solid #334155; display: flex; align-items: center; justify-content: center; overflow: hidden; }         
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }         
    .status { text-align: center; width: 30%; font-size: 11px; font-weight: bold; }         
    .timer { font-size: 12px; font-weight: bold; margin-bottom: 2px; }         
    .text-green { color: #10b981; } 
    .text-red { color: #f43f5e; } 
    .text-orange { color: #f59e0b; }         
    .start-time { font-size: 10px; color: #fff; }         
    .start-date { font-size: 10px; color: #94a3b8; }         
    .dot { height: 8px; width: 8px; background-color: #f43f5e; border-radius: 50%; animation: pulse 1s infinite; display: inline-block; }         
    
    @keyframes pulse { 
        0% { opacity: 1; } 
        50% { opacity: 0; } 
        100% { opacity: 1; } 
    }         

    #loader-container { 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%; 
        background: rgba(13, 17, 23, 0.95); 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        z-index: 1000; 
    }         
    .loader { border: 5px solid #333; border-top: 5px solid #10b981; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }         
    
    @keyframes spin { 
        0% { transform: rotate(0deg); } 
        100% { transform: rotate(360deg); } 
    }    

    .hot-badge {
        position: absolute !important;
        top: 0px !important;
        right: 0px !important;
        background: #f43f5e;
        color: white;
        padding: 3px 8px;
        font-size: 9px;
        font-weight: bold;
        border-bottom-left-radius: 8px;
        border-top-right-radius: 12px;
        z-index: 9999 !important;
        box-shadow: 0px 4px 10px rgba(244, 63, 94, 0.6); 
        animation: glow-animation 1.5s infinite alternate;
    }

    @keyframes glow-animation {
        0% { box-shadow: 0px 2px 5px rgba(244, 63, 94, 0.4); }
        100% { box-shadow: 0px 4px 15px rgba(244, 63, 94, 0.9); }
    }

    /* মুভি বা পোস্টার কার্ডের স্টাইল */
    .poster-card {
        padding: 0 !important;
        overflow: hidden;
        background: #161b22;
        margin-bottom: 20px;
    }

    .poster-img-box {
        width: 100%;
        height: 180px;
        overflow: hidden;
        border-top-left-radius: 13px;
        border-top-right-radius: 13px;
    }

    .poster-img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .poster-title {
        font-size: 13px;
        font-weight: bold;
        color: #ffffff;
        padding: 12px 12px 8px 12px;
        line-height: 1.4;
    }

    .poster-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px 12px 12px;
        font-size: 10px;
        color: #8b949e;
        border-top: 1px solid #30363d;
        gap: 5px;
        flex-wrap: wrap;
    }
    
    .loading-text {
        text-align: center;
        font-size: 12px;
        color: #8b949e;
        margin: 15px 0;
    }
</style>

<script>    




const liveMatches = [





    {
        league: "FOOTBALL | INTERNATIONAL FRIENDLY",
        team1Name: "Colombia", team1Flag: "https://flagcdn.com/co.svg",
        team2Name: "Jordan", team2Flag: "https://flagcdn.com/jo.svg",
        startTime: "2026-06-11 19:00:00",
        link: "https://livecdn.rockstreamer.com/main/Iscreen_fifa_main/playlist.m3u8|Referer=https://iscreen.com.bd/"
    },


    {
        league: "CRICKET | TEST SERIES",
        team1Name: "India", team1Flag: "https://flagcdn.com/in.svg",
        team2Name: "Afghanistan", team2Flag: "https://flagcdn.com/af.svg",
        startTime: "2026-06-16 07:15:00",
        isHot: true,
        link: "http://str2.v3v3v.xyz:2082/live/rokhsi25_951396/POm6KqnW/1949446.m3u8"
    },
    






// অন্যান্য লাইভ ম্যাচগুলো এখানে থাকবে...
];






// ডেমো ডেটা অ্যারে (এখানে আপনার ১০০০+ আইটেম থাকলেও অ্যাপ স্লো হবে না)
const allMovies = 


[
    {
        title: "Rockstar (2026)",
        details: "N/A | Music, Musical, Romance | 28 May 2026 \n IMDb Ratings : (N/A) \n Storyline : A rock musician, writes his own songs and composes them himself. \n Director : Azman Rusho \n Cast(s) : Sami Doha, Shakib Khan, Tariq Anam Khan \n Language : Bengali \n Quality : WEB-DL \n Resolution : 480P | 720P | 1080P \n Size : 1GB | 1.2GB | 2.3GB",
        img: "https://mlsbd-image.com/images/2026/07/23/17847769336a6188e5252a2.webp",
        date: "2026-07-15 10:00:00",
        link: "480P,,https://pub-7e14080129214e2588485953a3301a62.r2.dev/a0b0009bc0b3250d4f3e045477049d74?token=1784826438,)720P,,https://pub-2d03da1cc1fd4f9181bd7323727ca91f.r2.dev/dfe70b1f0ef46aea96bdb3f4e3dd3897?token=1784827840,)1080P,,https://pub-f526a4f18ba644488f7f0c45bc26466b.r2.dev/2e78402226627e38d4f1608dda905d3a?token=1784827890,)"
    },
    







    // আপনার বাকি হাজার হাজার আইটেম এখানে যোগ করতে পারেন...
];





let displayedMoviesCount = 0;
const batchSize = 5; // একবারে কয়টি করে মুভি লোড হবে
let currentSearch = '';

window.addEventListener('load', () => { 
    const loader = document.getElementById('loader-container');
    if (loader) loader.style.display = 'none'; 

    loadLiveMatches();
    loadMoreMovies();
    
    setInterval(updateTimers, 1000); 
    setInterval(updateMovieTimers, 60000);

    // ইনফিনিট স্ক্রোলিং লজিক (নিচে স্ক্রোল করলেই নতুন আইটেম লোড হবে)
    window.addEventListener('scroll', () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
            if (currentSearch === '') {
                loadMoreMovies();
            }
        }
    });
}); 

// লাইভ ম্যাচ রেন্ডার করার ফাংশন
function loadLiveMatches() {
    const container = document.getElementById('liveSliderContainer');
    container.innerHTML = '';
    
    liveMatches.forEach(match => {
        let card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('onclick', `sendData('${match.link}')`);
        card.innerHTML = `
            ${match.isHot ? '<div class="hot-badge">HOT 🔥</div>' : ''}
            <div class="league-header">${match.league}</div>         
            <div class="match-row">             
                <div class="team"><div class="logo-box"><img src="${match.team1Flag}"></div><div style="font-size:12px; margin-top:5px;">${match.team1Name}</div></div>             
                <div class="status" data-start="${match.startTime}"><div class="timer">--:--:--</div><div class="start-time"></div><div class="start-date"></div></div>             
                <div class="team"><div class="logo-box"><img src="${match.team2Flag}"></div><div style="font-size:12px; margin-top:5px;">${match.team2Name}</div></div>         
            </div>
        `;
        container.appendChild(card);
    });
    setupSliderDots();
}

// ধাপে ধাপে মুভি লোড করার ফাংশন (Lazy Loading / Pagination)
function loadMoreMovies() {
    const container = document.getElementById('movieContainer');
    let filteredList = allMovies.filter(movie => 
        (movie.title + " " + movie.details).toLowerCase().includes(currentSearch)
    );

    let nextBatch = filteredList.slice(displayedMoviesCount, displayedMoviesCount + batchSize);
    
    if (nextBatch.length === 0 && displayedMoviesCount === 0) {
        container.innerHTML = '<div class="loading-text">No movies and Live Match found</div>';
        return;
    }

    nextBatch.forEach(movie => {
        let card = document.createElement('div');
        card.className = 'card poster-card';
        card.setAttribute('onclick', `sendData('${movie.link}')`);
        card.innerHTML = `
            <div class="poster-img-box">
                <img src="${movie.img}" alt="Movie Poster">
            </div>
            <div class="poster-title">${movie.title} \n ${movie.details}</div>
            <div class="poster-footer">
                <span>👤 MLSBD TEAM</span>
                <span class="time-ago" data-date="${movie.date}">🕒 calculating...</span>
                <span>👁️ 0</span>
                <span>💬 No Comments</span>
            </div>
        `;
        container.appendChild(card);
    });

    displayedMoviesCount += nextBatch.length;
    updateMovieTimers();
}

// স্লাইডার ডট ইনডিকেটর আপডেট
function setupSliderDots() {
    const slider = document.querySelector('.live-slider-container');
    const cards = slider.querySelectorAll('.card');
    const dotsContainer = document.getElementById('sliderDots');

    if (!dotsContainer || cards.length === 0) return;

    dotsContainer.innerHTML = '';
    cards.forEach((_, index) => {
        const dot = document.createElement('span');
        if (index === 0) dot.classList.add('active');
        dotsContainer.appendChild(dot);
    });

    const dots = dotsContainer.querySelectorAll('span');

    slider.addEventListener('scroll', () => {
        let index = Math.round(slider.scrollLeft / slider.clientWidth);
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === index);
        });
    });
}

// অ্যাপ্লিকেশনের টেক্সটবক্স থেকে সার্চ করার ফাংশন (হ্যাং হওয়া রোধ করতে অপ্টিমাইজড)
function filterMatches(input) { 
    currentSearch = input ? input.toLowerCase() : ''; 
    displayedMoviesCount = 0;
    document.getElementById('movieContainer').innerHTML = '';
    
    // লাইভ ম্যাচ সার্চ ফিল্টার
    document.querySelectorAll('.live-slider-container .card').forEach(card => { 
        let text = card.innerText.toLowerCase(); 
        card.style.display = text.includes(currentSearch) ? "block" : "none";
    }); 

    // মুভি সার্চ ফিল্টার ও লোড
    loadMoreMovies();
} 

// মুভির টাইম কাউন্টডাউন
function updateMovieTimers() {
    document.querySelectorAll('.time-ago').forEach(el => {
        let postDate = new Date(el.getAttribute('data-date')).getTime();
        let now = new Date().getTime();
        let diff = now - postDate;

        let seconds = Math.floor(diff / 1000);
        let minutes = Math.floor(seconds / 60);
        let hours = Math.floor(minutes / 60);
        let days = Math.floor(hours / 24);

        let timeString = "";
        if (seconds < 60) timeString = "Just now";
        else if (minutes < 60) timeString = minutes + " mins ago";
        else if (hours < 24) timeString = hours + " hours ago";
        else timeString = days + " days ago";

        el.innerHTML = "🕒 " + timeString;
    });
}

// লাইভ ম্যাচের টাইমার আপডেট
function updateTimers() { 
    document.querySelectorAll('.status').forEach(el => { 
        let start = new Date(el.getAttribute('data-start')).getTime(); 
        let now = new Date().getTime(); 
        let diff = start - now; 
        let timerEl = el.querySelector('.timer'); 
        let dateObj = new Date(start); 
                         
        let card = el.closest('.card'); 
        let league = card.querySelector('.league-header').innerText.toUpperCase(); 
        let maxDuration = 10800000; 
        if (league.includes('TEST')) maxDuration = 432000000; 
        else if (league.includes('ODI')) maxDuration = 36000000; 
         
        el.querySelector('.start-time').innerText = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}); 
        el.querySelector('.start-date').innerText = dateObj.toLocaleDateString('en-GB'); 

        if (diff < 0 && diff > -maxDuration) { 
            let elapsed = Math.abs(diff); 
            let h = Math.floor(elapsed / 3600000); 
            let m = Math.floor((elapsed % 3600000) / 60000); 
            let s = Math.floor((elapsed % 60000) / 1000); 
            timerEl.className = "timer text-red"; 
            timerEl.innerHTML = `<div class="dot"></div> Live | Playing ${h}h ${m}m ${s}s`; 
        } else if (diff <= -maxDuration) { 
            timerEl.className = "timer"; 
            timerEl.innerText = "Finished"; 
        } else { 
            let h = Math.floor(diff / 3600000); 
            let m = Math.floor((diff % 3600000) / 60000); 
            let s = Math.floor((diff % 60000) / 1000); 
            timerEl.className = "timer text-green"; 
            timerEl.innerText = "Start in: " + h + "h " + m + "m " + s + "s"; 
        } 
    }); 
} 

function sendData(url) { 
    if (window.AppInventor) window.AppInventor.setWebViewString(url); 
    else if (window.CustomWebView) window.CustomWebView.setWebViewString(url); 
    else window.WebViewString = url; 
}
</script> 
</body> 
</html>
